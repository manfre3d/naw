<div class="section-wrapper">
  <p class="section-label">{{ subDescriptor().label }}</p>

  <div class="about-grid">

    <div class="about-text-col">
      <h2 class="section-title">{{ subDescriptor().title }}</h2>
      @for (p of subDescriptor().paragraphs; track $index) {
        <p class="about-story">{{ p }}</p>
      }
    </div>

    <div class="about-stats">
      @for (h of subDescriptor().highlights; track h.label) {
        <div class="stat-card">
          <span class="stat-value">{{ h.value }}</span>
          <span class="stat-label">{{ h.label }}</span>
        </div>
      }
    </div>

  </div>
</div>
