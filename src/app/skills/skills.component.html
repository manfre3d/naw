<div class="section-wrapper">
  <p class="section-label">{{ subDescriptor().label }}</p>
  <h2 class="section-title">{{ subDescriptor().title }}</h2>

  <div class="skills-grid">
    @for (category of subDescriptor().categories; track category.name) {
      <div class="skill-category" appTilt3d [maxTiltX]="3" [maxTiltY]="5" (pointermove)="onCardPointerMove($event)">
        <h3 class="category-name">{{ category.name }}</h3>
        <ul class="skill-tags" role="list">
          @for (skill of category.skills; track skill.name) {
            <li class="skill-tag" appMagneticHover [strength]="0.4" [returnDuration]="0.6">
              @if (skill.icon) {
                <i [class]="skill.icon" aria-hidden="true"></i>
              }
              {{ skill.name }}
            </li>
          }
        </ul>
      </div>
    }
  </div>
</div>
