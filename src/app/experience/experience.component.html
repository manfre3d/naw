<div class="section-wrapper">
  <p class="section-label">Career</p>
  <h2 class="section-title">{{ subDescriptor().title }}</h2>

  <div class="timeline">
    @for (item of subDescriptor().elements; track item.company) {
      <div class="timeline-item">
        <div class="timeline-marker">
          <img [src]="item.img" [alt]="item.company" class="timeline-logo" />
        </div>
        <div class="timeline-body">
          <div class="timeline-header">
            <h3 class="timeline-role">{{ item.role }}</h3>
            <span class="timeline-company">{{ item.company }}</span>
          </div>
          <div class="timeline-meta">
            <span class="badge-period">{{ item.period }}</span>
            <span class="badge-location">{{ item.location }}</span>
          </div>
          <p class="timeline-desc">{{ item.description }}</p>
        </div>
      </div>
    }
  </div>
</div>
