<footer class="footer-inner">
  <div class="footer-socials">
    @for (link of subDescriptor().linkElements; track link.link) {
      <a [href]="link.link" target="_blank" rel="noopener" class="social-icon" [attr.aria-label]="link.icon">
        <i [class]="link.icon"></i>
      </a>
    }
  </div>
  <p class="footer-copy">
    Built with <i class="fa-solid fa-heart" style="color: var(--color-accent)"></i> by Manfredi Piraino
  </p>
</footer>
