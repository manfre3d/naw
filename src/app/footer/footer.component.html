<footer class="footer-inner">
  <div class="footer-socials">
    @for (link of subDescriptor().linkElements; track link.link) {
      <a [href]="link.link" target="_blank" rel="noopener noreferrer" class="social-icon" [attr.aria-label]="link.label">
        <i [class]="link.icon" aria-hidden="true"></i>
      </a>
    }
  </div>
  <p class="footer-copy">
    {{ subDescriptor().footerText }}
  </p>
</footer>
