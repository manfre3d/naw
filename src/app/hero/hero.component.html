<div class="container my-5 py-4">
  <div class="text-center rounded-3">
    <div class="col-12 col-sm-6 mx-auto">
      <img [src]="subDescriptor.imgPath" class="img-fluid rounded mb-4" alt="Hero Image" />
    </div>
    <h1 class="display-5 fw-bold">{{ subDescriptor.primaryHeaderText }}</h1>
    <p class="col-lg-8 mx-auto fs-5 text-muted mb-4">{{ subDescriptor.secondaryHeaderText }}</p>
    <div class="d-flex justify-content-center gap-3">
      <a
        href="assets/cv_Manfredi_Piraino_2025.pdf"
        download="Manfredi_Piraino_CV.pdf"
        class="btn btn-outline-dark btn-lg rounded-pill"
      >
        Download CV
      </a>
      <a href="#contacts" class="btn btn-outline-dark btn-lg rounded-pill">Contacts</a>
    </div>
    <div class="d-flex justify-content-center mt-4 gap-3">
      @for (link of subDescriptor.linkElements; track link.link) {
        <a
          [href]="link.link"
          target="_blank"
          class="text-decoration-none d-inline-flex align-items-center justify-content-center rounded-circle shadow-sm fs-3 social-icon"
          [ngClass]="link.color"
        >
          <i [class]="link.icon"></i>
        </a>
      }
    </div>
  </div>
</div>
