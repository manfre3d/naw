<div class="hero-wrapper">
  <div class="hero-content">
    <div class="hero-avatar-wrapper">
      <img [src]="subDescriptor().imgPath" class="hero-avatar" alt="Manfredi Piraino" />
    </div>

    <p class="hero-greeting">Hi, I'm</p>
    <h1 class="hero-name">{{ subDescriptor().primaryHeaderText }}</h1>

    <div class="hero-typing-row">
      <span class="hero-typing">{{ displayedText() }}</span><span class="hero-cursor">|</span>
    </div>

    <div class="hero-actions">
      <a
        href="assets/cv_Manfredi_Piraino_2025.pdf"
        download="Manfredi_Piraino_CV.pdf"
        class="btn-primary-dark"
      >
        Download CV
      </a>
      <a href="#contacts" class="btn-outline-dark">Get in Touch</a>
    </div>

    <div class="hero-socials">
      @for (link of subDescriptor().linkElements; track link.link) {
        <a [href]="link.link" target="_blank" class="social-icon" [attr.aria-label]="link.icon">
          <i [class]="link.icon"></i>
        </a>
      }
    </div>
  </div>
</div>
