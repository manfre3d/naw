<nav class="nav-inner">
  <span class="nav-brand">mp<span class="accent">.</span></span>

  <div class="nav-links">
    @for (item of subDescriptor().nav.navigationList; track item.link) {
      <a class="nav-link" [class.active]="isActive(item.link)" [href]="item.link">{{ item.description }}</a>
    }
  </div>

  <div class="nav-right">
    <div class="lang-toggle">
      <button
        class="lang-btn"
        [class.active]="langService.currentLang() === 'en'"
        (click)="langService.setLang('en')"
      >EN</button>
      <span class="lang-sep">/</span>
      <button
        class="lang-btn"
        [class.active]="langService.currentLang() === 'it'"
        (click)="langService.setLang('it')"
      >IT</button>
    </div>

    <button
      class="hamburger"
      [class.open]="menuOpen()"
      (click)="menuOpen.set(!menuOpen())"
      aria-label="Toggle menu"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</nav>

<div class="mobile-menu" [class.open]="menuOpen()">
  @for (item of subDescriptor().nav.navigationList; track item.link) {
    <a class="mobile-link" [class.active]="isActive(item.link)" [href]="item.link" (click)="menuOpen.set(false)">
      {{ item.description }}
    </a>
  }
</div>
