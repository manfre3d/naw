    <!-- Resolve theme before first paint — avoids a flash of the wrong theme -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>

    <!-- Landing preloader — covers the initial paint while fonts load, then fades -->
    <style>
      #app-loader {
        position: fixed; inset: 0; z-index: 99999;
        display: grid; place-items: center;
        background: #F5F8FA;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      :root[data-theme="dark"] #app-loader { background: #08131A; }
      #app-loader.is-hidden { opacity: 0; visibility: hidden; }
      #app-loader .inner { display: flex; flex-direction: column; align-items: center; }
      #app-loader .mark {
        width: 46px; height: 46px; border-radius: 12px;
        display: grid; place-items: center;
        background: #0C7295; color: #fff;
        font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
        font-weight: 700; font-size: 20px; letter-spacing: -0.02em;
      }
      #app-loader .bar {
        margin-top: 18px; width: 120px; height: 3px;
        border-radius: 2px; background: rgba(120, 140, 150, 0.22); overflow: hidden;
      }
      #app-loader .bar::after {
        content: ""; display: block; height: 100%; width: 40%;
        border-radius: 2px; background: #0E82AC;
        animation: app-loader-slide 1.1s ease-in-out infinite;
      }
      :root[data-theme="dark"] #app-loader .bar::after { background: #2CC0DE; }
      #app-loader .msg {
        margin-top: 16px; min-height: 1.1em;
        font-family: 'JetBrains Mono', 'SFMono-Regular', ui-monospace, monospace;
        font-size: 12.5px; letter-spacing: 0.02em;
        color: #556069; transition: opacity 0.3s ease;
      }
      :root[data-theme="dark"] #app-loader .msg { color: #869AA1; }
      @keyframes app-loader-slide {
        0%   { transform: translateX(-120%); }
        100% { transform: translateX(320%); }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-loader { transition: none; }
        #app-loader .bar::after { animation: none; width: 100%; }
        #app-loader .msg { transition: none; }
      }
    </style>
  </head>
  <body>
    <div id="app-loader" role="status" aria-label="Loading portfolio">
      <div class="inner">
        <div class="mark">MP</div>
        <div class="bar" aria-hidden="true"></div>
        <p id="app-loader-msg" class="msg" aria-hidden="true"></p>
      </div>
    </div>
    <app-root></app-root>
    <script>
      (function () {
        var el = document.getElementById('app-loader');
        if (!el) return;
        var msgEl = document.getElementById('app-loader-msg');

        // Language — mirrors LanguageService: localStorage 'lang', else navigator.
        var lang = 'en';
        try {
          var saved = localStorage.getItem('lang');
          if (saved === 'en' || saved === 'it') lang = saved;
          else if ((navigator.language || '').toLowerCase().indexOf('it') === 0) lang = 'it';
        } catch (e) {}

        var MSGS = {
          en: ['Loading first impression…', 'Spinning up microservices…', 'Reconciling the pixels…', 'Rendering the 3D…', 'Almost in production…'],
          it: ['Caricando la prima impressione…', 'Avvio i microservizi…', 'Riconcilio i pixel…', 'Renderizzo il 3D…', 'Quasi in produzione…']
        };
        var list = MSGS[lang] || MSGS.en;
        var reduce = false;
        try { reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) {}
        var mi = 0, rot = null;
        if (msgEl) {
          msgEl.textContent = list[0];
          rot = setInterval(function () {
            mi = (mi + 1) % list.length;
            if (reduce) { msgEl.textContent = list[mi]; return; }
            msgEl.style.opacity = '0';
            setTimeout(function () { msgEl.textContent = list[mi]; msgEl.style.opacity = '1'; }, 180);
          }, 1500);
        }

        var start = Date.now(), MIN = 800, MAX = 4000, done = false;
        function hide() {
          if (done) return;
          done = true;
          if (rot) clearInterval(rot);
          var wait = Math.max(0, MIN - (Date.now() - start));
          setTimeout(function () {
            el.classList.add('is-hidden');
            setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 600);
          }, wait);
        }
        // Hide once webfonts are ready (the main flash source) or on full load,
        // whichever comes first; hard cap so it can never get stuck.
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(hide).catch(hide);
        }
        window.addEventListener('load', hide);
        setTimeout(hide, MAX);
      })();
    </script>
  </body>
</html>
